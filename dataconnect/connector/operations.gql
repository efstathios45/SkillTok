# Operations for SkillTok PostgreSQL Database

# --- User Mutations ---
mutation UpsertUser(
  $displayName: String!,
  $email: String!,
  $photoUrl: String!,
  $onboardingCompleted: Boolean!,
  $interests: [String!]!,
  $goals: [String!]!,
  $role: String!
) @auth(level: USER, insecureReason: "Users manage their own profile") {
  user_upsert(data: {
    id_expr: "auth.uid",
    displayName: $displayName,
    email: $email,
    photoUrl: $photoUrl,
    onboardingCompleted: $onboardingCompleted,
    interests: $interests,
    goals: $goals,
    role: $role
  })
}

query GetUserProfile($id: String!) @auth(level: USER, insecureReason: "Profiles are accessible") {
  user(id: $id) {
    id
    displayName
    email
    photoUrl
    bio
    role
    onboardingCompleted
    interests
    goals
  }
}

# --- Course Queries ---
query ListCourses @auth(level: PUBLIC, insecureReason: "Public discovery") {
  courses(where: { isPublished: { eq: true } }) {
    id
    title
    description
    thumbnailUrl
    subject
    level
    createdAt
    owner {
      displayName
    }
  }
}

query GetCourse($id: UUID!) @auth(level: PUBLIC, insecureReason: "Course details are public") {
  course(id: $id) {
    id
    title
    description
    thumbnailUrl
    subject
    level
  }
}

# --- Enrollment & Progress ---
mutation EnrollInCourse($courseId: UUID!) @auth(level: USER) {
  enrollment_upsert(data: { userId_expr: "auth.uid", courseId: $courseId })
}

mutation DeleteEnrollment($courseId: UUID!) @auth(level: USER, insecureReason: "Users can unenroll") {
  enrollment_delete(key: { userId_expr: "auth.uid", courseId: $courseId })
}

query GetEnrollments @auth(level: USER) {
  enrollments(where: { userId: { eq_expr: "auth.uid" } }) {
    courseId
  }
}

# --- Instructor Analytics ---
query GetCourseAnalytics($courseId: UUID!) @auth(level: USER, insecureReason: "Instructors view student data") {
  enrollments(where: { courseId: { eq: $courseId } }) {
    user {
      id
      displayName
      email
    }
  }
  progresses(where: { courseId: { eq: $courseId } }) {
    userId
    isCompleted
  }
}

# --- Social Standard ---
query ListReels @auth(level: PUBLIC) {
  reels(orderBy: [{ createdAt: DESC }]) {
    id
    title
    description
    videoUrl
    creator {
      displayName
      photoUrl
    }
  }
}

mutation ToggleLike($reelId: UUID!) @auth(level: USER) {
  like_upsert(data: { userId_expr: "auth.uid", reelId: $reelId })
}

mutation DeleteLike($reelId: UUID!) @auth(level: USER) {
  like_delete(key: { userId_expr: "auth.uid", reelId: $reelId })
}

mutation ToggleSave($reelId: UUID!) @auth(level: USER) {
  savedContent_upsert(data: { userId_expr: "auth.uid", reelId: $reelId })
}

mutation DeleteSave($reelId: UUID!) @auth(level: USER) {
  savedContent_delete(key: { userId_expr: "auth.uid", reelId: $reelId })
}

mutation AddComment($reelId: UUID, $courseId: UUID, $text: String!) @auth(level: USER) {
  comment_insert(data: { userId_expr: "auth.uid", reelId: $reelId, courseId: $courseId, text: $text })
}

query GetComments($reelId: UUID!) @auth(level: PUBLIC, insecureReason: "Comments are public") {
  comments(where: { reelId: { eq: $reelId } }, orderBy: [{ createdAt: DESC }]) {
    id
    text
    createdAt
    user {
      id
      displayName
    }
  }
}

mutation UpdateProgress($courseId: UUID!, $lessonId: UUID!, $isCompleted: Boolean!) @auth(level: USER) {
  progress_upsert(data: {
    userId_expr: "auth.uid",
    courseId: $courseId,
    lessonId: $lessonId,
    isCompleted: $isCompleted
  })
}

query GetUserLikes @auth(level: USER) {
  likes(where: { userId: { eq_expr: "auth.uid" } }) {
    reelId
  }
}

query GetUserSaved @auth(level: USER) {
  savedContents(where: { userId: { eq_expr: "auth.uid" } }) {
    reelId
  }
}

# --- Course Creation ---
mutation CreateCourse($id: UUID, $title: String!, $description: String!, $thumbnailUrl: String!, $subject: String!, $level: String!) @auth(level: USER) {
  course_insert(data: {
    id: $id,
    ownerId_expr: "auth.uid",
    title: $title,
    description: $description,
    thumbnailUrl: $thumbnailUrl,
    subject: $subject,
    level: $level,
    isPublished: true
  })
}

mutation CreateModule($id: UUID, $courseId: UUID!, $title: String!, $orderIndex: Int!) @auth(level: USER) {
  module_insert(data: {
    id: $id,
    courseId: $courseId,
    title: $title,
    orderIndex: $orderIndex
  })
}

mutation CreateLesson($id: UUID, $moduleId: UUID!, $title: String!, $description: String!, $lessonType: String!, $orderIndex: Int!, $contentUrl: String!) @auth(level: USER) {
  lesson_insert(data: {
    id: $id,
    moduleId: $moduleId,
    title: $title,
    description: $description,
    lessonType: $lessonType,
    orderIndex: $orderIndex,
    contentUrl: $contentUrl
  })
}
